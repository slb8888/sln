<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMBO CLUB - 核心权限系统</title>
    <style>
        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: #050505; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; height: 100vh; overflow-x: hidden; }

        /* --- 登录界面样式 (保留原汁原味) --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-title { font-size: 32px; font-weight: 900; color: #ffcc00; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255, 204, 0, 0.3); }
        .logo-sub { font-size: 12px; color: #666; letter-spacing: 1px; }

        .input-group { width: 100%; max-width: 320px; margin-bottom: 20px; }
        .input-field {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            color: #fff; font-size: 14px; border-radius: 4px; transition: 0.3s;
        }
        .input-field:focus { border-color: #ffcc00; box-shadow: 0 0 8px rgba(255, 204, 0, 0.2); }

        .btn-login {
            width: 100%; max-width: 320px; padding: 15px; background: linear-gradient(90deg, #ffcc00, #ff9900);
            border: none; color: #000; font-weight: bold; font-size: 16px; border-radius: 4px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3); margin-bottom: 20px;
        }
        .btn-login:active { transform: scale(0.98); }

        /* 新增：游客通道入口 */
        .guest-entry { font-size: 12px; color: #444; text-decoration: underline; cursor: pointer; margin-top: 10px; }
        .guest-entry:hover { color: #ffcc00; }

        /* --- 主界面样式 (登录后或游客进入后显示) --- */
        #main-app { display: none; padding: 20px; padding-bottom: 80px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-banner {
            background: linear-gradient(45deg, #111, #222); border: 1px solid #333;
            padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;
        }
        .marquee { color: #ffcc00; font-size: 14px; white-space: nowrap; overflow: hidden; }

        .card { background: #111; border: 1px solid #222; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .card h3 { color: #fff; font-size: 16px; margin-bottom: 10px; border-left: 3px solid #ffcc00; padding-left: 10px; }
        
        .wechat-btn {
            display: block; width: 100%; padding: 12px; background: #07c160;
            color: #fff; text-align: center; text-decoration: none; border-radius: 4px;
            font-weight: bold; margin-top: 10px;
        }

        /* 简单的底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0a;
            border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 10px 0;
        }
        .nav-item { color: #666; font-size: 12px; text-align: center; }
        .nav-item.active { color: #ffcc00; }

        /* 隐藏的管理员面板 */
        #admin-panel { display: none; border: 1px dashed #ffcc00; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- 1. 登录界面 (门面) -->
    <div id="login-screen">
        <div class="logo-area">
            <div class="logo-title">LAMBO CLUB</div>
            <div class="logo-sub">核心权限管理系统 v6.0 (源码加密版)</div>
        </div>

        <div class="input-group">
            <input type="text" id="admin-code" class="input-field" placeholder="请输入代号 (管理员必填)">
        </div>
        <div class="input-group">
            <input type="password" id="admin-key" class="input-field" placeholder="请输入密钥 (管理员必填)">
        </div>

        <button class="btn-login" onclick="checkLogin()">安全登录</button>
        
        <!-- 关键修改：给普通用户留的门 -->
        <div class="guest-entry" onclick="enterAsGuest()">我是普通玩家，直接进入 ></div>
    </div>

    <!-- 2. 主程序界面 (内容) -->
    <div id="main-app">
        <div class="header-banner">
            <div style="font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 5px;">🔥 9.9保底1000万</div>
            <div class="marquee">公告：官方唯一指定收米通道，谨防假冒... (此处可滚动)</div>
        </div>

        <!-- 这里的內容所有人都能看到 -->
        <div class="card">
            <h3>💎 业务范围</h3>
            <p style="color:#888; font-size:14px; line-height:1.6;">
                - 高端局护航<br>
                - 极速解封<br>
                - 账号托管<br>
                - 效率第一，不满意包退
            </p>
        </div>

        <div class="card">
            <h3>🚀 立即联系</h3>
            <p style="color:#888; font-size:14px; margin-bottom:10px;">添加主管微信，备注“护航”</p>
            <!-- 点击复制微信号 -->
            <div class="wechat-btn" onclick="copyWechat()">一键复制微信号: a192uu91</div>
        </div>

        <!-- 只有管理员登录成功才会显示这块 -->
        <div id="admin-panel">
            <h3 style="color:#ffcc00; text-align:center;">⚙️ 管理员控制台</h3>
            <p style="color:#fff; font-size:12px; text-align:center; margin:10px 0;">欢迎您，老板。在此处可更新打手列表。</p>
            <button style="width:100%; padding:8px; background:#333; color:#fff; border:none; border-radius:4px;">发布新任务</button>
        </div>
    </div>

    <script>
        // 配置区：在这里设置您的管理员密码
        const TRUE_CODE = "admin";   // 您的代号
        const TRUE_KEY = "888888";   // 您的密钥

        function checkLogin() {
            const code = document.getElementById('admin-code').value;
            const key = document.getElementById('admin-key').value;

            if (code === TRUE_CODE && key === TRUE_KEY) {
                // 密码正确 -> 进管理员模式
                alert("身份验证通过，欢迎回来老板！");
                showMainApp(true); 
            } else if (code === "" && key === "") {
                // 如果没填 -> 提示
                alert("请输入代号和密钥，或者点击下方【普通玩家】入口");
            } else {
                // 填错了 -> 拦截
                alert("代号或密钥错误！无权访问管理系统。");
            }
        }

        function enterAsGuest() {
            // 游客模式 -> 只能看前台
            showMainApp(false);
        }

        function showMainApp(isAdmin) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            const adminPanel = document.getElementById('admin-panel');
            if (isAdmin) {
                adminPanel.style.display = 'block'; // 显示管理后台
            } else {
                adminPanel.style.display = 'none';  // 隐藏管理后台
            }
        }

        function copyWechat() {
            const wx = "a192uu91";
            navigator.clipboard.writeText(wx).then(() => {
                alert("微信号 " + wx + " 已复制！请打开微信添加好友。");
            }).catch(() => {
                alert("复制失败，请手动添加：a192uu91");
            });
        }
    </script>
</body>
</html>
