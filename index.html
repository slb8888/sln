<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>兰博俱乐部 - 核心系统</title>
    <style>
        /* --- 基础重置与暗黑风格 --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        /* --- 容器布局 --- */
        .app-container { width: 100%; max-width: 420px; min-height: 100vh; background: #111; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* --- 顶部导航 --- */
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #222; background: #0f0f0f; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; background: linear-gradient(45deg, #007aff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .subtitle { font-size: 12px; color: #666; }

        /* --- 公告栏 --- */
        .notice-bar { background: rgba(0, 122, 255, 0.1); color: #007aff; padding: 10px 15px; font-size: 13px; display: flex; align-items: center; border-bottom: 1px solid #1a1a1a; }
        .notice-icon { margin-right: 8px; font-weight: bold; }

        /* --- 内容区域 --- */
        .content { flex: 1; padding: 30px 20px; display: flex; flex-direction: column; justify-content: center; }
        
        /* --- 表单样式 --- */
        .form-group { margin-bottom: 20px; }
        .input-box { width: 100%; background: #1c1c1e; border: 1px solid #333; padding: 14px; border-radius: 12px; color: #fff; font-size: 16px; transition: 0.3s; }
        .input-box:focus { border-color: #007aff; box-shadow: 0 0 0 2px rgba(0,122,255,0.2); }
        
        .btn-main { width: 100%; background: #007aff; color: #fff; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }
        .btn-danger { background: #ff3b30; margin-top: 10px; }

        /* --- 消息提示 --- */
        .msg-box { text-align: center; font-size: 14px; margin-top: 15px; min-height: 20px; }
        .msg-err { color: #ff3b30; }
        .msg-ok { color: #34c759; }

        /* --- 加载动画 (模拟考核) --- */
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #007aff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #fff; font-size: 14px; letter-spacing: 1px; }

        /* --- 隐藏类 --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 顶部 -->
    <div class="header">
        <div class="logo">LAMBORGHINI CLUB</div>
        <div class="subtitle">核心资源验证系统 V3.0</div>
    </div>

    <!-- 公告 -->
    <div id="notice-area" class="notice-bar hidden">
        <span class="notice-icon">📢</span>
        <span id="notice-text">系统维护中...</span>
    </div>

    <!-- 登录页 -->
    <div id="page-login" class="content">
        <div class="form-group">
            <input type="text" id="login-user" class="input-box" placeholder="请输入用户名 / 卡密">
        </div>
        <div class="form-group">
            <input type="password" id="login-pass" class="input-box" placeholder="请输入密码 (管理员必填)">
        </div>
        <button onclick="handleLogin()" class="btn-main">立即接入</button>
        <div id="login-msg" class="msg-box"></div>
    </div>

    <!-- 用户主页 -->
    <div id="page-user" class="content hidden">
        <h2 style="margin-bottom:20px; color:#fff;">欢迎回来</h2>
        <div style="background:#1c1c1e; padding:20px; border-radius:12px; margin-bottom:20px;">
            <p style="color:#888; font-size:12px;">当前状态</p>
            <p style="color:#34c759; font-size:18px; font-weight:bold; margin-top:5px;">已激活 - 永久授权</p>
        </div>
        <button onclick="logout()" class="btn-main btn-danger">退出登录</button>
    </div>

    <!-- 管理后台 -->
    <div id="page-admin" class="content hidden">
        <h2 style="margin-bottom:20px; color:#fff;">管理员控制台</h2>
        
        <div class="form-group">
            <label style="color:#888; font-size:12px; display:block; margin-bottom:5px;">发布全局公告</label>
            <input type="text" id="admin-notice-input" class="input-box" placeholder="输入公告内容...">
        </div>
        <button onclick="saveNotice()" class="btn-main" style="background:#333;">更新公告</button>

        <div style="margin-top:30px; border-top:1px solid #333; padding-top:20px;">
            <label style="color:#888; font-size:12px; display:block; margin-bottom:10px;">生成新卡密</label>
            <button onclick="generateKey()" class="btn-main">生成随机卡密</button>
            <div id="new-key-display" style="margin-top:15px; padding:10px; background:#222; border-radius:8px; text-align:center; color:#00d2ff; word-break:break-all;"></div>
        </div>

        <button onclick="logout()" class="btn-main btn-danger" style="margin-top:30px;">退出后台</button>
    </div>

    <!-- 加载层 -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div class="loading-text">正在校验数据完整性...</div>
    </div>
</div>

<script>
    // --- 配置区 ---
    const ADMIN_USER = "admin"; 
    const ADMIN_PASS = "123456"; // 默认管理员密码，你可以改
    
    // --- 初始化 ---
    window.onload = function() {
        // 检查是否已登录
        const session = localStorage.getItem('lb_session');
        if(session) {
            const data = JSON.parse(session);
            if(data.role === 'admin') showPage('page-admin');
            else showPage('page-user');
        }
        loadNotice();
    };

    // --- 核心逻辑 ---
    function handleLogin() {
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        const msg = document.getElementById('login-msg');

        if(!u) {
            msg.className = "msg-box msg-err";
            msg.innerText = "请输入账号或卡密";
            return;
        }

        // 显示假加载动画
        document.getElementById('loader').style.display = 'flex';
        
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            
            // 1. 管理员逻辑
            if(u === ADMIN_USER) {
                if(p === ADMIN_PASS) {
                    saveSession({role: 'admin'});
                    showPage('page-admin');
                } else {
                    msg.className = "msg-box msg-err";
                    msg.innerText = "管理员密码错误";
                }
                return;
            }

            // 2. 普通用户/卡密逻辑 (这里模拟验证，实际可对接数据库)
            // 假设卡密格式为 LB- 开头，或者只要输入了就算通过(演示用)
            if(u.startsWith('LB-') || u.length > 3) {
                 saveSession({role: 'user', key: u});
                 showPage('page-user');
            } else {
                msg.className = "msg-box msg-err";
                msg.innerText = "无效的卡密或账号";
            }
        }, 800); // 模拟800毫秒网络延迟
    }

    // --- 辅助功能 ---
    function showPage(pageId) {
        ['page-login', 'page-user', 'page-admin'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(pageId).classList.remove('hidden');
    }

    function saveSession(data) {
        localStorage.setItem('lb_session', JSON.stringify(data));
    }

    function logout() {
        localStorage.removeItem('lb_session');
        location.reload();
    }

    // --- 管理员功能 ---
    function saveNotice() {
        const txt = document.getElementById('admin-notice-input').value;
        if(txt) {
            localStorage.setItem('lb_notice', txt);
            alert("公告已发布！");
            loadNotice();
        }
    }

    function loadNotice() {
        const txt = localStorage.getItem('lb_notice');
        const bar = document.getElementById('notice-area');
        if(txt) {
            document.getElementById('notice-text').innerText = txt;
            bar.classList.remove('hidden');
        } else {
            bar.classList.add('hidden');
        }
    }

    function generateKey() {
        // 生成类似 LB-X8Y2Z 的随机码
        const rand = Math.random().toString(36).substring(2, 7).toUpperCase();
        const key = `LB-${rand}`;
        document.getElementById('new-key-display').innerText = key;
    }
</script>

</body>
</html>
