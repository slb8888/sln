<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>兰博俱乐部 - 核心系统</title>
    <style>
        /* --- 基础设置 & 解决不跟手 --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f0f0f; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            /* 关键优化：开启硬件加速 */
            -webkit-overflow-scrolling: touch;
            transform: translateZ(0);
        }

        /* --- 界面布局 --- */
        .container {
            width: 100%; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .hidden { display: none !important; }

        /* --- 卡片样式 --- */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px 20px;
            width: 100%; max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        h1 { margin-bottom: 10px; font-size: 24px; letter-spacing: 1px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        /* --- 输入框与按钮 --- */
        input {
            width: 100%; padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff; font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        input:focus { border-color: #007aff; }

        button {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #007aff, #0056b3);
            border: none; border-radius: 8px;
            color: #fff; font-size: 16px; font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        /* --- 状态提示 --- */
        .status-msg {
            margin-top: 15px; font-size: 13px; min-height: 20px;
        }
        .success { color: #4cd964; }
        .error { color: #ff3b30; }

        /* --- 管理员面板特有样式 --- */
        .admin-panel { text-align: left; }
        .admin-panel h2 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .info-label { color: #888; }
        .info-value { color: #fff; font-family: monospace; }

        .gen-box {
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-top: 20px;
        }
        .generated-key {
            word-break: break-all; color: #007aff; font-family: monospace; margin: 10px 0; display: block;
        }
    </style>
</head>

        let currentDeviceId = '';

        // 1. 生成/获取设备指纹 (无需权限，基于浏览器特征)
        function getDeviceFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.textBaseline = "alphabetic";
            ctx.fillStyle = "#f60";
            ctx.fillRect(125,1,62,20);
            ctx.fillStyle = "#069";
            ctx.fillText("LamborghiniClub", 2, 15);
            ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
            ctx.fillText("LamborghiniClub", 4, 17);
            
            // 结合屏幕信息和 UserAgent 生成唯一 ID
            const screenInfo = window.screen.width + "*" + window.screen.height + "*" + window.screen.colorDepth;
            const ua = navigator.userAgent;
            const mimeTypes = navigator.mimeTypes ? navigator.mimeTypes.length : 0;
            
            // 简单的哈希算法
            const str = screenInfo + ua + mimeTypes + canvas.toDataURL();
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return "DEV-" + Math.abs(hash).toString(16).toUpperCase().substring(0, 8);
        }
