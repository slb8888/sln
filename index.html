<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>兰博护航 - 和平精英专业陪玩</title>
    <!-- 引入图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- 全局重置与基础样式 --- */
        :root {
            --primary-color: #007AFF; /* KEG经典蓝 */
            --bg-color: #F5F6FA;
            --text-main: #333333;
            --text-sub: #999999;
            --nav-height: 60px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: calc(var(--nav-height) + 20px); /* 防止内容被底部遮挡 */
        }

        /* --- 顶部导航 --- */
        .header {
            background: #fff;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }

        /* --- 公告栏 --- */
        .notice-bar {
            background: #FFFBE6;
            color: #FA8C16;
            padding: 8px 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
        }
        .notice-bar i { margin-right: 5px; }

        /* --- 金刚区 (图标入口) --- */
        .grid-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 10px;
            background: #fff;
            margin-bottom: 10px;
        }
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #555;
            cursor: pointer;
        }
        .icon-box {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: #E6F7FF;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 8px;
        }
        /* 考核入口特殊样式 */
        .assess-box {
            background: #FFF0F6;
            color: #EB2F96;
        }

        /* --- 热门推荐 (瀑布流) --- */
        .section-title {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title span:last-child {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: normal;
        }

        .product-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 两列布局 */
            gap: 10px;
            padding: 0 10px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
        }

        .card-img {
            height: 100px;
            background: #333;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            position: relative;
        }
        /* 模拟图片标签 */
        .tag {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.6);
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 4px;
        }

        .card-info {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 14px;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            font-size: 10px;
            color: #999;
            background: #f9f9f9;
            padding: 3px;
            border-radius: 4px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price {
            color: #FF4D4F;
            font-size: 16px;
            font-weight: bold;
        }
        .price small { font-size: 12px; }

        .btn-buy {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-buy:active { opacity: 0.8; }

        /* --- 底部导航栏 --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 999; /* 确保在最上层 */
            padding-bottom: env(safe-area-inset-bottom); /* 适配iPhone底部横条 */
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 10px;
            flex: 1;
            height: 100%;
            justify-content: center;
            cursor: pointer;
        }
        .nav-item.active { color: var(--primary-color); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* --- 独家AI悬浮窗 --- */
        .ai-float {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00C6FF, #0072FF);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,114,255,0.4);
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- 弹窗通用样式 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #fff;
            width: 80%;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .modal h3 { margin-bottom: 10px; color: #333; }
        .modal p { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.5; }
        .modal-btn {
            background: var(--primary-color);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            font-size: 14px;
        }
        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 20px; color: #999;
            cursor: pointer;
        }

        /* --- 打手认证卡片样式 --- */
        .id-card {
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .id-card::after {
            content: 'LANBO';
            position: absolute;
            right: -10px; bottom: -10px;
            font-size: 40px; opacity: 0.1; font-weight: bold;
        }
        .id-header { display: flex; align-items: center; margin-bottom: 10px; }
        .avatar { width: 40px; height: 40px; background: #fff; border-radius: 50%; margin-right: 10px; }
        .id-name { font-weight: bold; font-size: 16px; }
        .id-role { font-size: 12px; opacity: 0.8; }
        .qr-placeholder {
            width: 80px; height: 80px; background: #fff; margin: 0 auto;
            display: flex; align-items: center; justify-content: center; color: #333; font-size: 12px;
        }

    </style>
</head>
