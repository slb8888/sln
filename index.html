<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAMBO CLUB - 核心系统</title>
    <style>
        /* --- 基础样式 --- */
        body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow-x: hidden; }
        
        /* 顶部跑马灯 */
        .marquee { background: #111; color: #ffcc00; padding: 8px; font-size: 14px; white-space: nowrap; overflow: hidden; border-bottom: 1px solid #333; }
        .marquee span { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* 通用容器 */
        .container { padding: 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        
        /* 标题 */
        h1 { color: #ffcc00; font-size: 28px; margin-top: 40px; margin-bottom: 10px; letter-spacing: 2px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 40px; }

        /* 输入框 */
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ffcc00; }

        /* 按钮 - 重点优化触摸区域 */
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #ffcc00, #ff9900); border: none; border-radius: 8px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* 隐藏类 */
        .hidden { display: none !important; }

        /* --- 后台界面样式 --- */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .user-info { color: #ffcc00; font-weight: bold; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .menu-card { background: #161616; padding: 20px; border-radius: 10px; border: 1px solid #333; text-align: center; cursor: pointer; }
        .menu-card h3 { margin: 0 0 5px 0; color: #fff; font-size: 16px; }
        .menu-card p { margin: 0; color: #888; font-size: 12px; }

        /* 列表样式 */
        .list-item { background: #161616; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ffcc00; }
        .status { font-size: 12px; padding: 2px 6px; border-radius: 4px; background: #333; color: #aaa; }
        .status.active { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }

        /* AI 浮窗 */
        .ai-float { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #ffcc00; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.4); z-index: 999; cursor: pointer; }
        .ai-float img { width: 35px; height: 35px; }
    </style>
</head>
<body>

    <!-- 顶部跑马灯 -->
    <div class="marquee"><span>🔥 9.9保底1000万 | 官方唯一指定收米通道 | 严禁私下交易 | LB家族永不为奴 🔥</span></div>

    <!-- === 登录界面 === -->
    <div id="loginPage" class="container">
        <h1>LAMBO CLUB</h1>
        <p class="subtitle">核心权限管理系统 v4.0 (修复版)</p>
        
        <input type="text" id="username" value="admin" placeholder="请输入代号">
        <input type="password" id="password" placeholder="请输入密钥">
        
        <!-- 这里的 onclick 直接绑定，最稳妥 -->
        <button onclick="handleLogin()">登 录</button>
    </div>

    <!-- === 后台主界面 (默认隐藏) === -->
    <div id="dashboardPage" class="container hidden">
        <div class="dashboard-header">
            <span class="user-info">管理员: Admin</span>
            <span style="font-size:12px; color:#666;" onclick="logout()">[退出]</span>
        </div>

        <!-- 核心功能区 -->
        <div class="grid-menu">
            <div class="menu-card" onclick="alert('进入下单系统...')">
                <h3>📝 快速下单</h3>
                <p>创建新任务</p>
            </div>
            <div class="menu-card" onclick="alert('打开财务中心...')">
                <h3>💰 财务中心</h3>
                <p>收款/付款记录</p>
            </div>
            <div class="menu-card" onclick="alert('查看人员考核...')">
                <h3>📊 人员考核</h3>
                <p>打手绩效统计</p>
            </div>
            <div class="menu-card" onclick="alert('系统设置...')">
                <h3>⚙️ 系统设置</h3>
                <p>权限与公告</p>
            </div>
        </div>

        <h3 style="text-align:left; margin-bottom:10px; color:#888;">实时打手列表</h3>
        <div id="hitmanList">
            <!-- JS 会自动填充这里 -->
        </div>
    </div>

    <!-- AI 助手浮窗 -->
    <div class="ai-float" onclick="alert('AI助手：老板，今天需要查什么账？')">
        🤖
    </div>

    <script>
        // 模拟数据库数据
        const hitmenData = [
            { id: 'LB001', name: '暴龙', status: '接单中', amount: '5000' },
            { id: 'LB888', name: '法拉利', status: '空闲', amount: '0' },
            { id: 'LB666', name: '闪电', status: '考核中', amount: '200' },
            { id: 'LB999', name: '坦克', status: '接单中', amount: '12000' }
        ];

        // 登录函数
        function handleLogin() {
            var u = document.getElementById('username').value;
            var p = document.getElementById('password').value;

            if(u === 'admin' && p === '123456') {
                // 切换界面
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                
                // 加载数据
                loadHitmen();
            } else {
                alert('❌ 账号或密码错误！\n提示：admin / 123456');
            }
        }

        // 退出登录
        function logout() {
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('password').value = '';
        }

        // 加载打手列表
        function loadHitmen() {
            var listHtml = '';
            hitmenData.forEach(function(item) {
                var statusClass = item.status === '空闲' ? 'active' : '';
                listHtml += `
                    <div class="list-item">
                        <div>
                            <div style="font-weight:bold; color:#fff;">${item.id} - ${item.name}</div>
                            <div style="font-size:12px; color:#666;">累计业绩: ${item.amount} U</div>
                        </div>
                        <div class="status ${statusClass}">${item.status}</div>
                    </div>
                `;
            });
            document.getElementById('hitmanList').innerHTML = listHtml;
        }
    </script>
</body>
</html>
