<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>兰博俱乐部 - 核心系统</title>
    <style>
        /* --- 核心优化：解决不跟手和卡顿 --- */
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f0f0f; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            /* 关键优化：开启硬件加速 */
            -webkit-overflow-scrolling: touch;
            transform: translateZ(0);
        }

        /* --- 布局容器 --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- 标题样式 --- */
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #ff0055, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* --- 卡片样式 --- */
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* --- 输入框样式 --- */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input:focus {
            border-color: #ff0055;
        }

        /* --- 按钮样式 --- */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .btn:active { transform: scale(0.98); }
        
        .btn-primary {
            background: linear-gradient(90deg, #ff0055, #ff5500);
            color: white;
        }
        .btn-secondary {
            background: #333;
            color: #ccc;
            margin-top: 10px;
        }

        /* --- 状态标签 --- */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .status-admin { background: #ff0055; color: white; }
        .status-user { background: #00aa55; color: white; }
        .status-guest { background: #555; color: #ddd; }

        /* --- 隐藏区域 --- */
        .hidden { display: none !important; }

        /* --- 列表样式 --- */
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:last-child { border-bottom: none; }
        
        .copy-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部标题 -->
    <div style="margin-top: 20px;">
        <h1>兰博俱乐部</h1>
        <p class="subtitle">Lambo Club System V2.0</p>
    </div>

    <!-- 1. 登录/注册区域 (默认显示) -->

        <input type="text" id="device-id-display" placeholder="设备ID: 获取中..." readonly style="background:#222; color:#666; border:none;">
        <input type="password" id="access-code" placeholder="请输入卡密/激活码">
        
        <button onclick="handleLogin()" class="btn btn-primary">进入系统</button>
    </div>

    <!-- 2. 管理员面板 (仅管理员可见) -->
    <div id="admin-panel" class="card hidden">
        <span class="status-badge status-admin">超级管理员</span>
        <h3 style="margin-top:0">管理控制台</h3>

            <div style="display:flex; gap:10px; margin-top:5px;">

                <button onclick="generateCard()" class="btn btn-primary" style="width:auto; margin:0;">生成</button>
            </div>
        </div>

        <button onclick="enterLobby()" class="btn btn-primary">进入考核大厅</button>
        <button onclick="logout()" class="btn btn-secondary">退出登录</button>
    </div>

    <!-- 3. 普通用户面板 (仅已激活用户可见) -->
    <div id="user-panel" class="card hidden">
        <span class="status-badge status-user">认证成员</span>
        <h3 style="margin-top:0">成员中心</h3>
        <p style="font-size:13px; color:#ccc;">您的设备已激活，可以使用以下功能。</p>
        
        <ul>
            <li>
                <span>📜 查看考核进度</span>
                <span style="color:#00aa55">进行中</span>
            </li>
            <li>
                <span>🛠️ 辅助工具下载</span>
                <span style="color:#888">v1.2</span>
            </li>
        </ul>

        <button onclick="enterLobby()" class="btn btn-primary" style="margin-top:20px;">进入考核大厅</button>
        <button onclick="logout()" class="btn btn-secondary">退出登录</button>
    </div>

</div>
