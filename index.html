<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>兰博护航 - 和平精英专业陪玩</title>
    <!-- 引入图标库 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- 全局重置与基础样式 --- */
        :root {
            --primary-color: #007AFF; /* KEG经典蓝 */
            --bg-color: #F5F6FA;
            --text-main: #333333;
            --text-sub: #999999;
            --price-color: #FF4D4F;
            --nav-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: calc(var(--nav-height) + 20px); }

        /* --- 顶部导航 --- */
        .top-bar {
            background: #fff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* --- 轮播图区域 --- */
        .banner {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #007AFF, #00C6FF);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        .banner::after { content: 'PEACEKEEPER ELITE'; position: absolute; opacity: 0.1; font-size: 40px; transform: rotate(-10deg); }

        /* --- 金刚区（功能入口） --- */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 0 15px;
            margin-bottom: 20px;
            background: #fff;
            padding-top: 15px;
            padding-bottom: 15px;
        }
        .menu-item { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .menu-icon {
            width: 45px; height: 45px;
            background: #E6F2FF;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary-color);
            font-size: 20px;
            margin-bottom: 8px;
        }
        .menu-text { font-size: 12px; color: var(--text-main); }

        /* --- 商品列表 --- */
        .section-title { padding: 0 15px; font-size: 16px; font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-title span { font-size: 12px; color: var(--text-sub); font-weight: normal; }

        .product-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 0 10px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .card-img {
            height: 120px;
            background-color: #eee;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .tag {
            position: absolute;
            top: 5px; left: 5px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .card-info { padding: 10px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-desc { font-size: 11px; color: var(--text-sub); margin-bottom: 8px; }
        .card-bottom { display: flex; justify-content: space-between; align-items: center; }
        .price { color: var(--price-color); font-weight: bold; font-size: 16px; }
        .price small { font-size: 12px; }
        .buy-btn {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        /* --- 独家AI悬浮窗 --- */
        .ai-float {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
            z-index: 999;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* --- 底部导航栏 (修复核心) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            z-index: 1000; /* 确保在最上层 */
            padding-bottom: env(safe-area-inset-bottom); /* 适配iPhone底部横条 */
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            font-size: 10px;
            text-decoration: none;
            width: 25%; /* 严格限制宽度 */
        }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary-color); }

        /* --- 弹窗样式 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #fff;
            width: 80%;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .modal h3 { margin-bottom: 10px; color: #333; }
        .modal p { font-size: 14px; color: #666; margin-bottom: 15px; }
        .modal-btn {
            background: var(--primary-color); color: #fff;
            padding: 10px 0; width: 100%; border-radius: 8px;
            border: none; font-size: 16px;
        }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 20px; color: #999; cursor: pointer; }

        /* 打手卡片样式 */
        .hunter-card {
            background: linear-gradient(to right, #1e1e1e, #2a2a2a);
            color: gold;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid gold;
            display: flex;
            align-items: center;
        }
        .hunter-avatar { width: 50px; height: 50px; background: #444; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .hunter-info h4 { color: #fff; margin-bottom: 5px; }
        .hunter-info p { font-size: 12px; color: #aaa; margin: 0; }
        .verified-badge { background: gold; color: #000; font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }

    </style>
</head>
