<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>兰博俱乐部 - 核心系统</title>
    <style>
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            background: #0a0a0a; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-overflow-scrolling: touch;
        }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* 标题 */
        .logo { text-align: center; margin: 30px 0; }
        .logo h1 { 
            font-size: 26px; letter-spacing: 2px; margin: 0;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { color: #666; font-size: 12px; margin-top: 5px; }

        /* 卡片 */
        .card {
            background: #161616; border-radius: 12px; padding: 25px;
            margin-bottom: 15px; border: 1px solid #222;
        }
        .card h2 { font-size: 16px; margin: 0 0 15px; color: #eee; }

        /* 表单 */
        input {
            width: 100%; padding: 14px; background: #0f0f0f;
            border: 1px solid #333; border-radius: 8px;
            color: #fff; font-size: 15px; margin-bottom: 12px;
        }
        input:focus { border-color: #ffd700; }

        /* 按钮 */
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; }
        .btn-dark { background: #222; color: #aaa; margin-top: 10px; }
        .btn-sm { width: auto; padding: 8px 16px; font-size: 13px; display: inline-block; }

        /* 状态提示 */
        .msg { text-align: center; font-size: 13px; min-height: 20px; margin-top: 10px; }
        .msg-ok { color: #4cd964; }
        .msg-err { color: #ff3b30; }

        /* 列表 */
        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #222; font-size: 13px;
        }
        .list-item:last-child { border-bottom: none; }
        .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .tag-used { background: #333; color: #888; }
        .tag-new { background: rgba(255,215,0,0.15); color: #ffd700; }

        /* 公告 */
        .notice { 
            background: rgba(255,215,0,0.08); border-left: 3px solid #ffd700;
            padding: 12px 15px; border-radius: 0 8px 8px 0; margin-bottom: 15px;
            font-size: 13px; color: #ccc; line-height: 1.6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>LAMBORGHINI CLUB</h1>
        <p>核心权限管理系统 v3.0</p>
    </div>

    <!-- ========== 登录页 ========== -->
    <div id="page-login">
        <div class="card">
            <h2>🔐 身份验证</h2>
            <input type="text" id="login-user" placeholder="账号 / 卡密" autocomplete="off">
            <input type="password" id="login-pass" placeholder="密码">
            <button class="btn btn-gold" onclick="doLogin()">登 录</button>
            <div id="login-msg" class="msg"></div>
        </div>
        <p style="text-align:center;color:#444;font-size:11px;">首次访问请使用默认管理员账号登录</p>
    </div>

    <!-- ========== 管理员后台 ========== -->
    <div id="page-admin" class="hidden">
        <!-- 公告编辑 -->
        <div class="card">
            <h2>📢 发布公告</h2>
            <input type="text" id="admin-notice-input" placeholder="输入公告内容...">
            <button class="btn btn-gold btn-sm" onclick="saveNotice()">发布</button>
        </div>

        <!-- 生成卡密 -->
        <div class="card">
            <h2>🎫 卡密管理</h2>
            <button class="btn btn-gold" onclick="genKey()">生成新卡密</button>
            <div id="new-key-box" class="msg msg-ok" style="margin:15px 0;word-break:break-all;"></div>
            
            <div style="margin-top:15px;">
                <h3 style="font-size:13px;color:#888;margin-bottom:10px;">已生成卡密列表</h3>
                <div id="key-list"></div>
            </div>
        </div>

        <button class="btn btn-dark" onclick="logout()">退出登录</button>
    </div>

    <!-- ========== 用户大厅 ========== -->
    <div id="page-user" class="hidden">
        <div id="user-notice" class="notice hidden"></div>

        <div class="card">
            <h2>🏎️ 考核通道</h2>
            <p style="color:#888;font-size:13px;margin-bottom:15px;">完成以下考核任务获取正式成员资格</p>
            
            <div style="margin-bottom:15px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px;">
                    <span>考核进度</span><span>0%</span>
                </div>
                <div style="height:6px;background:#222;border-radius:3px;overflow:hidden;">
                    <div style="width:0%;height:100%;background:#ffd700;border-radius:3px;transition:width 1s;"></div>
                </div>
            </div>

            <button class="btn btn-gold" onclick="alert('请配置真实考核链接')">进入考核大厅</button>
        </div>

        <div class="card">
            <h2>🛠️ 功能模块</h2>
            <div class="list-item"><span>辅助工具 v2.1</span><span style="color:#4cd964">可用</span></div>
            <div class="list-item"><span>规则文档</span><span style="color:#888">只读</span></div>
            <div class="list-item"><span>在线客服</span><span style="color:#ffd700">在线</span></div>
        </div>

        <button class="btn btn-dark" onclick="logout()">退出登录</button>
    </div>
</div>

<script>
// ===== 数据存储键名 =====
const K_ADMIN = 'lambo_admin';      // 管理员账号信息
const K_KEYS = 'lambo_keys';        // 卡密列表
const K_NOTICE = 'lambo_notice';    // 公告
const K_SESSION = 'lambo_session';  // 当前登录会话

// ===== 初始化 =====
window.onload = function() {
    initAdmin();
    checkSession();
};

// 初始化管理员（仅首次）
function initAdmin() {
    if (!localStorage.getItem(K_ADMIN)) {
        // 默认管理员账号密码，你可以改成自己的
        localStorage.setItem(K_ADMIN, JSON.stringify({
            user: 'admin',
            pass: 'admin888'
        }));
    }
}

// 检查登录状态
function checkSession() {
    const session = JSON.parse(localStorage.getItem(K_SESSION) || 'null');
    if (!session) return showPage('page-login');

    if (session.role === 'admin') {
        loadAdminPanel();
        showPage('page-admin');
    } else if (session.role === 'user') {
        loadUserPanel();
        showPage('page-user');
    } else {
        showPage('page-login');
    }
}

// ===== 登录逻辑 =====
function doLogin() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value.trim();
    const msg = document.getElementById('login-msg');

    if (!user || !pass) {
        msg.className = 'msg msg-err';
        msg.textContent = '请输入账号和密码';
        return;
    }

    // 验证管理员
    const admin = JSON.parse(localStorage.getItem(K_ADMIN));
    if (user === admin.user && pass === admin.pass) {
        saveSession({ role: 'admin', user: user });
        msg.className = 'msg msg-ok';
        msg.textContent = '管理员登录成功！';
        setTimeout(() => { loadAdminPanel(); showPage('page-admin'); }, 500);
        return;
    }

    // 验证卡密用户
    const keys = JSON.parse(localStorage.getItem(K_KEYS) || '[]');
    const matchedKey = keys.find(k => k.key === user && k.pass === pass);
    
    if (matchedKey) {
        if (matchedKey.used) {
            msg.className = 'msg msg-err';
            msg.textContent = '该卡密已被使用！';
            return;
        }
        // 标记为已使用
        matchedKey.used = true;
        matchedKey.useTime = new Date().toLocaleString();
        localStorage.setItem(K_KEYS, JSON.stringify(keys));
        
        saveSession({ role: 'user', key: user });
        msg.className = 'msg msg-ok';
        msg.textContent = '验证成功，正在进入...';
        setTimeout(() => { loadUserPanel(); showPage('page-user'); }, 800);
    } else {
        msg.className = 'msg msg-err';
        msg.textContent = '账号或密码错误';
    }
}

// ===== 管理员功能 =====
function loadAdminPanel() {
    renderKeyList();
    const notice = localStorage.getItem(K_NOTICE) || '';
    document.getElementById('admin-notice-input').value = notice;
}

function genKey() {
    const key = 'LB-' + Math.random().toString(36).substr(2,6).toUpperCase();
    const pass = Math.random().toString(36).substr(2,6);
    const keys = JSON.parse(localStorage.getItem(K_KEYS) || '[]');
    keys.unshift({ key, pass, used: false, createTime: new Date().toLocaleString() });
    localStorage.setItem(K_KEYS, JSON.stringify(keys));
    
    document.getElementById('new-key-box').textContent = '✅ 新卡密 → 账号: ' + key + ' | 密码: ' + pass;
    renderKeyList();
}

function renderKeyList() {
    const keys = JSON.parse(localStorage.getItem(K_KEYS) || '[]');
    const box = document.getElementById('key-list');
    if (keys.length === 0) {
        box.innerHTML = '<div style="color:#444;font-size:13px;text-align:center;padding:10px;">暂无卡密</div>';
        return;
    }
    box.innerHTML = keys.map(k => `
        <div class="list-item">
            <div>
                <div style="color:#fff;">${k.key}</div>
                <div style="color:#666;font-size:11px;">密码: ${k.pass}</div>
            </div>
            <span class="tag ${k.used ? 'tag-used' : 'tag-new'}">${k.used ? '已使用' : '未使用'}</span>
        </div>
    `).join('');
}

function saveNotice() {
    const text = document.getElementById('admin-notice-input').value.trim();
    localStorage.setItem(K_NOTICE, text);
    alert('公告已发布！');
}

// ===== 用户功能 =====
function loadUserPanel() {
    const notice = localStorage.getItem(K_NOTICE) || '';
    if (notice) {
        const el = document.getElementById('user-notice');
        el.textContent = '📢 ' + notice;
        el.classList.remove('hidden');
    }
}

// ===== 通用工具 =====
function saveSession(data) {
    localStorage.setItem(K_SESSION, JSON.stringify(data));
}

function logout() {
    localStorage.removeItem(K_SESSION);
    location.reload();
}

function showPage(id) {
    ['page-login','page-admin','page-user'].forEach(p => {
        document.getElementById(p).classList.toggle('hidden', p !== id);
    });
}
</script>
</body>
</html>
